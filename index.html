<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Zyllio documentation homepage in English">
  <title>Zyllio Documentation | Welcome</title>
  <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
  <div class="page-shell">
    <aside class="sidebar">
      <docs-sidebar-shell></docs-sidebar-shell>
    </aside>

    <main class="main">
      <header class="section hero" id="welcome">
        <img class="hero-banner" src="assets/images/hero-banner.png" alt="Zyllio studio banner">
        <div class="hero-body">
          <span class="kicker">Welcome</span>
          <h1>What is Zyllio?</h1>
          <p class="lead">Zyllio is an all-in-one solution to build professional mobile applications in any business domain.</p>
        </div>
      </header>

      <section class="section" id="overview">
        <div class="section-grid">
          <div>
            <h2>Overview</h2>
            <p>This repository is autonomous and contains local EN/FR pages for the full documentation tree.</p>
          </div>
          <figure class="visual">
            <img src="assets/images/home-feature.webp" alt="Feature preview of Zyllio">
          </figure>
        </div>
      </section>
    </main>
  </div>
<script src="assets/js/sidebar-shell.js"></script>
</body>
</html>
